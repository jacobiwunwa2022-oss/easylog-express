<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EasyLog Express</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    header {
      background: #ffcc00;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
    }

    .hero {
      background: url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d');
      background-size: cover;
      color: white;
      padding: 80px 20px;
      text-align: center;
    }

    .track-box {
      background: white;
      padding: 20px;
      margin: 20px;
      border-radius: 10px;
      text-align: center;
    }

    input {
      padding: 10px;
      width: 70%;
    }

    button {
      padding: 10px;
      background: #ffcc00;
      border: none;
      cursor: pointer;
    }

    .services {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .service {
      background: white;
      margin: 10px;
      padding: 20px;
      width: 250px;
      border-radius: 10px;
    }

    footer {
      background: #222;
      color: white;
      padding: 20px;
      text-align: center;
    }
  </style>
</head>

<body>

<header>
  <h1>🚚 EasyLog Express</h1>
</header>

<section class="hero">
  <h2>Fast & Reliable International Shipping</h2>
  <p>Delivering your packages worldwide</p>
</section>

<div class="track-box">
  <h3>Track Your Shipment</h3>
  <input type="text" id="trackingNumber" placeholder="Enter Tracking Number">
  <button onclick="track()">Track</button>
  <div id="result"></div>
</div>

<section class="services">
  <div class="service">
    <h3>Air Freight</h3>
    <p>Fast global delivery</p>
  </div>

  <div class="service">
    <h3>Ocean Freight</h3>
    <p>Affordable bulk shipping</p>
  </div>

  <div class="service">
    <h3>Courier Delivery</h3>
    <p>Door-to-door service</p>
  </div>
</section>

<footer>
  <p>EasyLog Express - London, UK</p>
</footer>

<script>
async function track() {
  const number = document.getElementById('trackingNumber').value;

  const res = await fetch('/api/track/' + number);
  const data = await res.json();

  if (data.error) {
    document.getElementById('result').innerText = "Tracking number not found";
  } else {
    document.getElementById('result').innerText =
      "Status: " + data.status;
  }
}
</script>

</body>
</html>
