<div class="header">Track Your Shipment</div>

<div class="container">
  <div class="card">
    <input id="t" placeholder="Enter Tracking Number">
    <button onclick="track()">Track</button>

    <pre id="out"></pre>
  </div>
</div>

<script>
async function track() {
  const res = await fetch("/api/track/" + t.value);
  const data = await res.json();
  out.innerText = JSON.stringify(data, null, 2);
}
</script>
