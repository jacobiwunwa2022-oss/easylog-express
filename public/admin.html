<div class="header">EasyLog Admin Dashboard</div>

<div class="container">

  <div class="card">
    <h3>Create Shipment</h3>

    <input id="sender" placeholder="Sender">
    <input id="receiver" placeholder="Receiver">
    <input id="origin" placeholder="Origin">
    <input id="destination" placeholder="Destination">

    <button onclick="create()">Generate Tracking</button>

    <p id="result"></p>
  </div>

  <div class="card">
    <h3>Update Shipment Status</h3>

    <input id="t" placeholder="Tracking Number">
    <input id="status" placeholder="Status (Delivered, Transit, etc)">

    <button onclick="update()">Update</button>

    <p id="out"></p>
  </div>

</div>

<script>
async function create() {
  const res = await fetch("/api/create", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      sender: sender.value,
      receiver: receiver.value,
      origin: origin.value,
      destination: destination.value
    })
  });

  const data = await res.json();
  result.innerText = "Tracking: " + data.tracking;
}

async function update() {
  const res = await fetch("/api/update/" + t.value, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ status: status.value })
  });

  const data = await res.json();
  out.innerText = "Updated!";
}
</script>
